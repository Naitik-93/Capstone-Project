<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Secure Access</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, hsl(16, 90%, 58%), hsl(45, 93%, 58%));
        }

        a{
            text-decoration: none;
            color: white;
        }
        .card {
            background: white;
            width: 100%;
            max-width: 450px;
            border-radius: 12px;
            box-shadow: 0 20px 50px -20px rgba(255, 107, 74, 0.25);
            overflow: hidden;
        }

        .card-header {
            padding: 32px 32px 16px;
            text-align: center;
        }

        .card-title {
            font-size: 30px;
            font-weight: bold;
            color: hsl(222.2, 84%, 4.9%);
            margin-bottom: 8px;
        }

        .card-description {
            font-size: 16px;
            color: hsl(215.4, 16.3%, 46.9%);
        }

        .card-content {
            padding: 16px 32px 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: hsl(222.2, 84%, 4.9%);
            margin-bottom: 8px;
        }

        .input {
            width: 100%;
            height: 44px;
            padding: 0 16px;
            font-size: 14px;
            border: 1px solid hsl(214.3, 31.8%, 91.4%);
            border-radius: 12px;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input:focus {
            border-color: hsl(16, 90%, 58%);
            box-shadow: 0 0 0 3px hsla(16, 90%, 58%, 0.2);
        }

        .input::placeholder {
            color: hsl(215.4, 16.3%, 46.9%);
        }

        .forgot-password {
            text-align: right;
            margin-bottom: 20px;
        }

        .forgot-password a {
            font-size: 14px;
            color: hsl(16, 90%, 58%);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .forgot-password a:hover {
            color: hsl(16, 90%, 48%);
        }

        .button {
            width: 100%;
            height: 44px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            background: linear-gradient(to right, hsl(16, 90%, 58%), hsl(45, 93%, 58%));
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 14px 0 rgba(255, 107, 74, 0.39);
            transition: all 0.2s;
        }

        .button:hover {
            opacity: 0.9;
            box-shadow: 0 6px 20px 0 rgba(255, 107, 74, 0.5);
            transform: translateY(-1px);
        }

        .card-footer {
            padding: 0 32px 32px;
            text-align: center;
        }

        .signup-text {
            font-size: 14px;
            color: hsl(215.4, 16.3%, 46.9%);
        }

        .signup-text a {
            color: hsl(16, 90%, 58%);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .signup-text a:hover {
            color: hsl(16, 90%, 48%);
        }

        @media (max-width: 640px) {
            .card {
                max-width: 100%;
            }

            .card-header,
            .card-content,
            .card-footer {
                padding-left: 24px;
                padding-right: 24px;
            }

            .card-title {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-header">
            <h1 class="card-title">Welcome Back</h1>
            <p class="card-description">Enter your credentials to access your account</p>
        </div>
        <div class="card-content">
            <form>
                <div class="form-group">
                    <label class="label" for="username">Username</label>
                    <input 
                        class="input" 
                        type="text" 
                        id="username" 
                        placeholder="Enter your username"
                        required
                    >
                </div>
                <div class="form-group">
                    <label class="label" for="password">Password</label>
                    <input 
                        class="input" 
                        type="password" 
                        id="password" 
                        placeholder="Enter your password"
                        required
                    >
                </div>
                <div class="forgot-password">
                    <a href="#">Forgot password?</a>
                </div>
                <button class="button" type="submit">
                    <a href="index.html">Sign In</a>
                </button>
            </form>
        </div>
        <div class="card-footer">
            <p class="signup-text">
                Don't have an account? 
                <a href="#">Sign up</a>
            </p>
        </div>
    </div>
</body>
</html>
